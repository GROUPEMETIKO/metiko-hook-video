name: Hook Video

on:
  workflow_dispatch:
    inputs:
      title:
        required: true
        type: string
      image_url:
        required: true
        type: string
      output_name:
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg and Python tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install pillow requests

      - name: Render hook video
        run: |
          python3 render_hook.py "${{ inputs.title }}" "${{ inputs.image_url }}" "${{ inputs.output_name }}"

      - name: Upload hook video
        uses: actions/upload-artifact@v4
        with:
          name: hook-video
          path: "${{ inputs.output_name }}"
